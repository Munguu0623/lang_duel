name: english_duel
description: Competitive AI-powered English voice battle platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  # HTTP client for backend API calls
  http: ^1.2.2
  # MIME type parsing for multipart uploads (transitive dep of http)
  http_parser: ^4.0.2
  # Persistent key-value store — used for JWT token & onboarding flag
  shared_preferences: ^2.3.1
  # Audio recording for voice duel
  record: ^5.2.0
  # Microphone permission handling
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/langduel_applogo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
